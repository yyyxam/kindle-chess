name: Release

# Triggered when a `v*` tag is pushed (e.g. `v0.2.0`). The in-app updater
# parses tag_name through `parse_tag_version` and downloads two assets:
#   - kindle-chess-armv7-musl         (the cross-compiled binary)
#   - kindle-chess-armv7-musl.sha256  (sha256sum-format sidecar)
# These names are the contract with src/api/github.rs — keep them in sync.

on:
  push:
    tags:
      - 'v*'
  # Allow manual runs from the Actions tab (handy for re-uploading assets).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build a release for'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    env:
      ASSET_NAME: kindle-chess-armv7-musl
      TARGET: armv7-unknown-linux-musleabi

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}
          # Full history so build.rs can resolve a real git short SHA.
          fetch-depth: 0

      - name: Sanity-check tag matches Cargo.toml version
        working-directory: kindle_chess
        run: |
          TAG_VERSION="${{ steps.tag.outputs.name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          MANIFEST_VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$TAG_VERSION  manifest=$MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match Cargo.toml version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Cross-compile (armv7-musl, release)
        working-directory: kindle_chess
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" \
            cross build --target "$TARGET" --release

      - name: Stage release assets
        working-directory: kindle_chess
        run: |
          mkdir -p ../dist
          cp "target/${TARGET}/release/kindle-hello" "../dist/${ASSET_NAME}"
          cd ../dist
          sha256sum "${ASSET_NAME}" > "${ASSET_NAME}.sha256"
          ls -la

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          # Create the release if it doesn't exist; upload (and overwrite) the
          # two assets either way.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi
          gh release upload "$TAG" \
            "dist/${ASSET_NAME}" \
            "dist/${ASSET_NAME}.sha256" \
            --clobber
